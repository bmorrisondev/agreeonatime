stages:
  - prep
  - mobile
  - web_build
  - web_deploy
  - submit

variables:
  PNPM_STORE_PATH: ".pnpm-store"
  IOS_SIGNING_INFISICAL_ENV: "prod"
  IOS_SIGNING_INFISICAL_PATH: "/ios-signing"

.node_job:
  image: node:24-bullseye
  before_script:
    - corepack enable
    - pnpm install --frozen-lockfile --store-dir "$PNPM_STORE_PATH"
  cache:
    key: "$CI_COMMIT_REF_SLUG-node"
    paths:
      - .pnpm-store/

.macos_job:
  tags:
    - macos
  before_script:
    - corepack enable
    - pnpm install --frozen-lockfile --store-dir "$PNPM_STORE_PATH"
  cache:
    key: "$CI_COMMIT_REF_SLUG-macos"
    paths:
      - .pnpm-store/
      - .cocoapods/
      - .cocoapods-cache/
      - vendor/bundle/

warm_caches:
  extends: .macos_job
  stage: prep
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main")'
  script:
    - pnpm run sync:ios-pods

deploy_testflight:
  extends: .macos_job
  stage: mobile
  resource_group: testflight_upload
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "dev" && $INFISICAL_TOKEN && $EXPO_TOKEN && ($ASC_API_KEY_JSON_BASE64 || $EXPO_APPLE_APP_SPECIFIC_PASSWORD)'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main" && $INFISICAL_TOKEN && $EXPO_TOKEN && ($ASC_API_KEY_JSON_BASE64 || $EXPO_APPLE_APP_SPECIFIC_PASSWORD)'
      when: manual
      allow_failure: true
  script:
    - pnpm run deploy:testflight:ci
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - builds/

web_build_verify:
  extends: .node_job
  stage: web_build
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "dev"'
      variables:
        WEB_TARGET_ENV: "dev"
        INFISICAL_ENV: "dev"
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      variables:
        WEB_TARGET_ENV: "prod"
        INFISICAL_ENV: "prod"
  script:
    - |
      if [ -n "${INFISICAL_TOKEN:-}" ]; then
        bash ci/install-infisical-cli.sh
        infisical run --env="$INFISICAL_ENV" --token="$INFISICAL_TOKEN" -- bash ci/build-web-verify.sh "$WEB_TARGET_ENV"
      else
        bash ci/build-web-verify.sh "$WEB_TARGET_ENV"
      fi
  artifacts:
    expire_in: 7 days
    paths:
      - dist/

deploy_vercel_preview:
  extends: .node_job
  stage: web_deploy
  needs:
    - job: web_build_verify
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $VERCEL_TOKEN && $VERCEL_PROJECT_ID'
      when: manual
      allow_failure: true
  allow_failure: true
  script:
    - bash ci/deploy-vercel-dist.sh preview

deploy_vercel_production:
  extends: .node_job
  stage: web_deploy
  needs:
    - job: web_build_verify
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $VERCEL_TOKEN && $VERCEL_PROJECT_ID'
      when: manual
      allow_failure: true
  allow_failure: true
  script:
    - bash ci/deploy-vercel-dist.sh production
